<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5F7138">
  <title>Ahlak Rehberim</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="heroInner">
      <div class="topBar">
        <div class="brandRow">
          <div class="appIcon">🌿</div>
          <div>
            <div id="kicker" class="kicker">Bilinçli Tüketim Rehberi</div>
            <h1 id="appTitle">Ahlak Rehberim</h1>
            <p id="appSubtitle">Bilinçli tüket, güvenle tercih et.</p>
          </div>
        </div>

        <div class="actions">
          <div class="langSwitch" aria-label="Dil seçimi">
            <button data-lang="tr" type="button" title="Türkçe">🇹🇷</button>
            <button data-lang="en" type="button" title="English">🇬🇧</button>
            <button data-lang="de" type="button" title="Deutsch">🇩🇪</button>
          </div>
          <button id="themeBtn" class="iconBtn" type="button" aria-label="Tema değiştir">🌙</button>
        </div>
      </div>

      <div class="searchBox">
        <span>🔍</span>
        <input id="search" type="search" placeholder="Marka, firma veya kategori ara..." autocomplete="off">
        <button id="clearBtn" type="button" aria-label="Aramayı temizle">×</button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section id="stats" class="stats"></section>
    <section id="quickActions" class="quickActions"></section>
    <section id="quickFilters" class="quickFilters"></section>
    <section id="sectionTitle" class="sectionTitle"></section>
    <section id="results" class="results"></section>
  </main>

  <nav class="bottomNav" aria-label="Alt menü">
    <button data-view="home" class="active" type="button"><span>🏠</span><small data-i="navHome">Ana</small></button>
    <button data-view="companies" type="button"><span>🏢</span><small data-i="navCompanies">Firmalar</small></button>
    <button data-view="categories" type="button"><span>📂</span><small data-i="navCategories">Kategori</small></button>
    <button data-view="favorites" type="button"><span>❤️</span><small data-i="navFavorites">Favori</small></button>
    <button data-view="about" type="button"><span>ℹ️</span><small data-i="navAbout">Bilgi</small></button>
  </nav>

  <dialog id="detailDialog" class="detailDialog">
    <div id="detailContent"></div>
    <button id="closeDialog" class="closeDialog" type="button">Kapat</button>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
