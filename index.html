<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#60703a">
  <title>Boykot Rehberi</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="heroInner">
      <div class="brandRow">
        <div class="appIcon">🫒</div>
        <div>
          <div class="kicker">Mobil Rehber</div>
          <h1>Boykot Rehberi</h1>
          <p>Marka, ana firma ve alternatifleri hızlıca ara.</p>
        </div>
        <button id="themeBtn" class="iconBtn" type="button" aria-label="Tema değiştir">🌙</button>
      </div>
      <div class="searchBox">
        <span>🔍</span>
        <input id="search" type="search" placeholder="Marka, ana firma, kategori veya alternatif ara..." autocomplete="off">
        <button id="clearBtn" type="button" aria-label="Aramayı temizle">×</button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section id="stats" class="stats"></section>
    <section id="quickFilters" class="quickFilters"></section>
    <section id="sectionTitle" class="sectionTitle"></section>
    <section id="results" class="results"></section>
  </main>

  <nav class="bottomNav" aria-label="Alt menü">
    <button data-view="home" class="active" type="button"><span>🏠</span><small>Ana</small></button>
    <button data-view="boykot" type="button"><span>🔴</span><small>Boykot</small></button>
    <button data-view="safe" type="button"><span>✅</span><small>Değil</small></button>
    <button data-view="companies" type="button"><span>🏢</span><small>Firmalar</small></button>
    <button data-view="about" type="button"><span>ℹ️</span><small>Bilgi</small></button>
  </nav>

  <dialog id="detailDialog" class="detailDialog">
    <div id="detailContent"></div>
    <button id="closeDialog" class="closeDialog" type="button">Kapat</button>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
