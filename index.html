<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#5F7138">
  <title>Ahlak Rehberim</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Ahlak Rehberim</p>
      <h1>Etik tüketim rehberi</h1>
      <p class="sub">Marka, ana firma, kategori, alternatif ve kaynak bilgilerini inceleyin.</p>
    </div>
    <div class="heroActions">
      <button id="refreshBtn">Veriyi Yenile</button>
      <button id="clearBtn">Temizle</button>
    </div>
  </header>

  <main class="wrap">
    <section class="searchPanel">
      <input id="searchInput" type="search" placeholder="Marka, ana firma, kategori veya barkod ara..." autocomplete="off">
      <select id="countryFilter"><option value="">Ülke / tümü</option></select>
      <select id="categoryFilter"><option value="">Kategori / tümü</option></select>
      <select id="companyFilter"><option value="">Ana firma / tümü</option></select>
      <select id="statusFilter">
        <option value="">Filtre / tümü</option>
        <option value="review">İncelenmesi önerilir</option>
        <option value="preferred">Tercih edilebilir</option>
        <option value="alternative">Alternatifli</option>
        <option value="sourced">Kaynaklı</option>
        <option value="control">Kontrol gerekli</option>
      </select>
    </section>

    <section class="stats" id="stats"></section>

    <section class="quick">
      <button data-quick="review">🔴 İncelenmesi önerilir</button>
      <button data-quick="preferred">✅ Tercih edilebilir</button>
      <button data-quick="alternative">⭐ Alternatifli</button>
      <button data-quick="sourced">📚 Kaynaklı</button>
    </section>

    <div class="sectionTitle">
      <h2>Markalar</h2>
      <span id="resultCount"></span>
    </div>

    <section class="grid" id="results"></section>
  </main>

  <dialog id="detailDialog">
    <div class="dialogTop">
      <button id="closeDialog" aria-label="Kapat">×</button>
    </div>
    <div id="detailBody"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
